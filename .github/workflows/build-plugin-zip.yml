name: Build Plugin ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Build installable plugin ZIP
        run: |
          set -euo pipefail

          PLUGIN_SLUG="passkey-hub"
          BUILD_ROOT="dist/${PLUGIN_SLUG}"
          ZIP_PATH="dist/${PLUGIN_SLUG}.zip"

          rm -rf dist
          mkdir -p "${BUILD_ROOT}"

          cp -R admin "${BUILD_ROOT}/"
          cp -R includes "${BUILD_ROOT}/"
          cp -R languages "${BUILD_ROOT}/"
          cp -R vendor "${BUILD_ROOT}/"
          cp index.php passkey-hub.php readme.txt uninstall.php "${BUILD_ROOT}/"

          (
            cd dist
            zip -r "${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}"
          )

          echo "ZIP_PATH=${ZIP_PATH}" >> "$GITHUB_ENV"

      - name: Upload installable ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: passkey-hub-main-build
          path: ${{ env.ZIP_PATH }}
          if-no-files-found: error
