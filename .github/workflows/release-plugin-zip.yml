name: Release Plugin ZIP

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Build installable plugin ZIP (single archive)
        run: |
          set -euo pipefail

          PLUGIN_SLUG="passkeyflow"
          DIST_DIR="dist"
          BUILD_ROOT="${DIST_DIR}/${PLUGIN_SLUG}"

          rm -rf "${DIST_DIR}"
          mkdir -p "${BUILD_ROOT}"

          cp -R admin "${BUILD_ROOT}/"
          cp -R includes "${BUILD_ROOT}/"
          cp -R languages "${BUILD_ROOT}/"
          cp -R vendor "${BUILD_ROOT}/"
          cp index.php passkeyflow.php readme.txt uninstall.php composer.json composer.lock "${BUILD_ROOT}/"

          (
            cd "${DIST_DIR}"
            zip -r "${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}"
          )

      - name: Upload ZIP as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: passkeyflow-release-build
          path: dist/passkeyflow.zip
          if-no-files-found: error

      - name: Attach ZIP to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/passkeyflow.zip
